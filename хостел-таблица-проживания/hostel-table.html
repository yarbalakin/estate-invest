<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Таблица проживания — Хостел</title>
  <link rel="icon" href="/estate-logo.jpg" type="image/jpeg">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0c14;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 28px 16px 52px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -80px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(245,192,0,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -60px;
      width: 340px; height: 340px;
      background: radial-gradient(circle, rgba(245,192,0,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container { max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }

    /* Header */
    header {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; margin-bottom: 36px; text-align: center;
    }
    .logo-wrap {
      width: 64px; height: 64px; border-radius: 16px; overflow: hidden;
      box-shadow: 0 0 0 2px rgba(245,192,0,0.35), 0 8px 32px rgba(245,192,0,0.2);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .header-title {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #F5C000 0%, #ffe066 60%, #e8a800 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: -6px; }

    /* Section label */
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: #F5C000; opacity: 0.7;
      margin-bottom: 10px; padding-left: 2px;
    }

    /* Card block */
    .block {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
      opacity: 0; transform: translateY(14px);
      animation: fadeUp 0.4s ease forwards;
    }
    .block:nth-child(1) { animation-delay: 0.05s; }
    .block:nth-child(2) { animation-delay: 0.12s; }
    .block:nth-child(3) { animation-delay: 0.19s; }
    .block:nth-child(4) { animation-delay: 0.26s; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Form elements */
    label {
      display: block; font-size: 11px; font-weight: 600;
      color: rgba(245,192,0,0.7); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 6px;
    }
    input[type=text], input[type=date] {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 14px; color: #e8e8e8;
      font-family: inherit;
      transition: border-color .15s, background .15s;
      appearance: none;
    }
    input:focus {
      outline: none;
      border-color: rgba(245,192,0,0.5);
      background: rgba(245,192,0,0.05);
    }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(1) saturate(3) hue-rotate(5deg); cursor: pointer; }

    /* Кастомный дропдаун */
    .custom-select { position: relative; width: 100%; }
    .custom-select-trigger {
      width: 100%; padding: 10px 36px 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 14px; color: #e8e8e8;
      font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .custom-select-trigger:hover,
    .custom-select.open .custom-select-trigger {
      border-color: rgba(245,192,0,0.5);
      background: rgba(245,192,0,0.05);
    }
    .custom-select-arrow {
      flex-shrink: 0; margin-left: 8px;
      color: #F5C000; font-size: 11px; opacity: 0.7;
      transition: transform .2s;
    }
    .custom-select.open .custom-select-arrow { transform: rotate(180deg); }
    .custom-select-dropdown {
      display: none;
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 100;
      background: #131626;
      border: 1px solid rgba(245,192,0,0.2);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .custom-select.open .custom-select-dropdown { display: block; }
    .custom-select-option {
      padding: 11px 14px;
      font-size: 14px; color: #e8e8e8;
      cursor: pointer;
      transition: background .12s, color .12s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .custom-select-option:last-child { border-bottom: none; }
    .custom-select-option:hover { background: rgba(245,192,0,0.1); color: #F5C000; }
    .custom-select-option.selected { background: rgba(245,192,0,0.08); color: #F5C000; font-weight: 600; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px; }

    /* Buttons */
    .btn {
      display: block; width: 100%; margin-top: 4px; padding: 13px;
      border: none; border-radius: 10px;
      background: linear-gradient(135deg, #F5C000, #e8a800);
      color: #0a0c14; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: opacity .15s, transform .1s;
      letter-spacing: 0.2px;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: default; transform: none; }

    .btn-test {
      display: block; width: 100%; margin-top: 8px; padding: 10px;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      background: transparent; color: rgba(255,255,255,0.4);
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-test:hover { border-color: rgba(245,192,0,0.4); color: rgba(245,192,0,0.8); }

    /* Status */
    .status { margin-top: 12px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
    .status.loading { background: rgba(245,192,0,0.08); color: #F5C000; border: 1px solid rgba(245,192,0,0.2); display: block; }
    .status.ok  { background: rgba(34,197,94,0.08); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); display: block; }
    .status.err { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); display: block; white-space: pre-wrap; word-break: break-all; }

    /* Settings */
    details { margin-top: 8px; }
    details summary {
      font-size: 11px; color: rgba(255,255,255,0.2);
      cursor: pointer; user-select: none; list-style: none;
      text-align: center; padding: 8px;
      transition: color .15s;
    }
    details summary:hover { color: rgba(245,192,0,0.5); }
    details[open] summary { color: rgba(245,192,0,0.6); }
    .settings-inner { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-wrap"><img src="/estate-logo.jpg" alt="Estate Invest"></div>
    <div class="header-title">Таблица проживания</div>
    <div class="header-sub">Хостел · г. Краснокамск</div>
  </header>

  <div class="block">
    <div class="section-label">Контрагент</div>
    <div class="custom-select" id="companySelect">
      <div class="custom-select-trigger" id="companyTrigger">
        <span id="companyLabel">— загрузка... —</span>
        <span class="custom-select-arrow">▼</span>
      </div>
      <div class="custom-select-dropdown" id="companyDropdown"></div>
    </div>
    <input type="hidden" id="company" value="">
  </div>

  <div class="block">
    <div class="section-label">Период</div>
    <div class="row2">
      <div>
        <label>С даты</label>
        <input type="date" id="dateFrom">
      </div>
      <div>
        <label>По дату</label>
        <input type="date" id="dateTo">
      </div>
    </div>
    <div class="hint">Если «по дату» позже сегодня — обрезается автоматически</div>
  </div>

  <div class="block">
    <button class="btn" id="btn" onclick="generate()" disabled>Скачать Excel-таблицу</button>
    <button class="btn-test" onclick="testConnection()">Проверить подключение</button>
    <div class="status" id="status"></div>

    <details>
      <summary>⚙ Настройки</summary>
      <div class="settings-inner">
        <label>URL Apps Script (переопределить)</label>
        <input type="text" id="apiUrl" placeholder="Оставьте пустым — используется встроенный URL">
        <div class="hint">Меняйте только если задеплоили новую версию скрипта</div>
      </div>
    </details>
  </div>

</div>

<script>
var DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbyuYnkFWj6nZFd-oweeNaeiJXuWlFW8o7KaQNntGJ0hCLXkzdHpzhDArm6tysuwwzXYKQ/exec';
var SCRIPT_URL  = localStorage.getItem('hostel_script_url') || DEFAULT_URL;

function init() {
  var now = new Date();
  var y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  var today = y+'-'+m+'-'+d;
  document.getElementById('dateFrom').value = y+'-'+m+'-01';
  document.getElementById('dateTo').value   = today;
  document.getElementById('dateTo').max     = today;
  if (SCRIPT_URL !== DEFAULT_URL) document.getElementById('apiUrl').value = SCRIPT_URL;
  loadCompanies();
}

document.getElementById('apiUrl').addEventListener('blur', function() {
  var url = this.value.trim();
  if (url && url !== SCRIPT_URL) { SCRIPT_URL = url; localStorage.setItem('hostel_script_url', url); loadCompanies(); }
  else if (!url) { SCRIPT_URL = DEFAULT_URL; localStorage.removeItem('hostel_script_url'); }
});

function apiFetch(params, callback) {
  var proxyParams = Object.assign({ scriptUrl: SCRIPT_URL }, params);
  var qs = Object.keys(proxyParams).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(proxyParams[k]);
  }).join('&');
  fetch('/hostel-api/?' + qs)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      try { callback(null, JSON.parse(text)); }
      catch(e) { callback(new Error('Неверный ответ: ' + text.substring(0, 300))); }
    })
    .catch(function(err) { callback(err); });
}

function testConnection() {
  setStatus('Тестирую подключение...', 'loading');
  apiFetch({ action: 'companies' }, function(err, data) {
    if (err || !data.ok) { setStatus('Ошибка: ' + (err ? err.message : data.error), 'err'); return; }
    setStatus('✓ Подключено! Контрагентов: ' + data.companies.length + ' — ' + data.companies.join(', '), 'ok');
  });
}

// Кастомный дропдаун
(function() {
  var trigger  = document.getElementById('companyTrigger');
  var wrap     = document.getElementById('companySelect');
  var dropdown = document.getElementById('companyDropdown');

  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    wrap.classList.toggle('open');
  });
  document.addEventListener('click', function() { wrap.classList.remove('open'); });
  dropdown.addEventListener('click', function(e) { e.stopPropagation(); });
})();

function setCompanyOptions(companies) {
  var dropdown = document.getElementById('companyDropdown');
  var hidden   = document.getElementById('company');
  var label    = document.getElementById('companyLabel');
  var wrap     = document.getElementById('companySelect');

  dropdown.innerHTML = '';
  companies.forEach(function(c, i) {
    var opt = document.createElement('div');
    opt.className = 'custom-select-option' + (i === 0 ? ' selected' : '');
    opt.textContent = c;
    opt.addEventListener('click', function() {
      hidden.value = c;
      label.textContent = c;
      dropdown.querySelectorAll('.custom-select-option').forEach(function(o) { o.classList.remove('selected'); });
      opt.classList.add('selected');
      wrap.classList.remove('open');
    });
    dropdown.appendChild(opt);
  });

  // Выбрать первый по умолчанию
  if (companies.length > 0) {
    hidden.value = companies[0];
    label.textContent = companies[0];
  }
}

function loadCompanies() {
  setStatus('Загружаю...', 'loading');
  apiFetch({ action: 'companies' }, function(err, data) {
    if (err || !data || !data.ok) {
      document.getElementById('companyLabel').textContent = 'Ошибка загрузки';
      setStatus('Не удалось загрузить список.\n' + (err ? err.message : (data && data.error || '')), 'err');
      return;
    }
    setCompanyOptions(data.companies);
    document.getElementById('btn').disabled = false;
    clearStatus();
  });
}

function generate() {
  var company  = document.getElementById('company').value;
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo   = document.getElementById('dateTo').value;
  if (!company)  { setStatus('Выберите контрагента.', 'err'); return; }
  if (!dateFrom || !dateTo) { setStatus('Укажите даты.', 'err'); return; }

  var today = new Date(); today.setHours(0,0,0,0);
  var toDate = new Date(dateTo); toDate.setHours(0,0,0,0);
  if (toDate > today) { dateTo = today.toISOString().slice(0,10); document.getElementById('dateTo').value = dateTo; }

  document.getElementById('btn').disabled = true;
  setStatus('Загружаю данные...', 'loading');

  apiFetch({ action: 'residents', company: company, dateFrom: dateFrom, dateTo: dateTo }, function(err, data) {
    document.getElementById('btn').disabled = false;
    if (err)      { setStatus('Ошибка: ' + err.message, 'err'); return; }
    if (!data.ok) { setStatus('Ошибка: ' + data.error, 'err'); return; }
    buildXlsx(data);
  });
}

function buildXlsx(data) {
  setStatus('Формирую файл...', 'loading');
  var residents = data.residents, colHeaders = data.colHeaders, nDays = colHeaders.length;
  var periodLabel = data.dateFrom.split('-').reverse().join('.') + ' — ' + data.dateTo.split('-').reverse().join('.');

  var wb = XLSX.utils.book_new(), rows = [];
  rows.push(['Таблица проживания сотрудников за период ' + periodLabel]);
  rows.push(['Контрагент: ' + data.company]);
  rows.push(['Объект: ' + data.location + '   |   Цена: ' + data.price + ' руб./сут.']);
  rows.push([]);
  rows.push(['№', 'ФИО', 'Ком.'].concat(colHeaders).concat(['Дней', 'Сумма']));

  var totalDays = 0, totalAmount = 0;
  residents.forEach(function(res, idx) {
    var row = [idx+1, res.fio, res.room];
    for (var d = 1; d <= nDays; d++) row.push(res.days.indexOf(d) >= 0 ? res.price : '');
    row.push(res.daysCount, res.total || '');
    rows.push(row);
    totalDays += res.daysCount; totalAmount += res.total;
  });

  rows.push([]);
  var tot = new Array(3 + nDays).fill('');
  tot[1] = 'Всего проживают:'; tot.push(totalDays, totalAmount);
  rows.push(tot);
  rows.push([]); rows.push([]);
  rows.push(['Представитель ' + data.company + ': ________________________________']);
  rows.push([data.hostName + ':  ________________________________']);

  var ws = XLSX.utils.aoa_to_sheet(rows);
  var tc = 3 + nDays + 2;
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:tc-1}},{s:{r:1,c:0},e:{r:1,c:tc-1}},{s:{r:2,c:0},e:{r:2,c:tc-1}}];
  var cols = [{wch:4},{wch:30},{wch:6}];
  for (var i = 0; i < nDays; i++) cols.push({wch:3});
  cols.push({wch:6},{wch:10});
  ws['!cols'] = cols;

  XLSX.utils.book_append_sheet(wb, ws, periodLabel.replace(/ /g,'').substring(0,31));
  XLSX.writeFile(wb, 'Таблица проживания ' + periodLabel + ' — ' + data.company + '.xlsx');
  setStatus('✓ Файл скачан. ' + residents.length + ' чел., ' + totalDays + ' чел/дней' +
    (totalAmount > 0 ? ', ' + totalAmount.toLocaleString('ru-RU') + ' ₽' : ''), 'ok');
}

function setStatus(msg, type) { var el = document.getElementById('status'); el.textContent = msg; el.className = 'status ' + type; }
function clearStatus() { document.getElementById('status').className = 'status'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estate Invest — Сбор финансирования</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #334155;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #475569;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .progress-bar {
      height: 20px;
      background: #1a2332;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stat-pct {
      font-size: 20px;
      font-weight: 700;
      color: #f8fafc;
    }

    .stat-detail {
      font-size: 14px;
      color: #94a3b8;
    }

    .stat-remaining {
      font-size: 13px;
      color: #64748b;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #1e293b;
      font-size: 12px;
      color: #475569;
    }

    @media (max-width: 480px) {
      body { padding: 16px 12px; }
      h1 { font-size: 20px; }
      .card { padding: 16px; }
      .stat-pct { font-size: 18px; }
      .stats { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Estate Invest</h1>
      <div class="subtitle">Партнерское финансирование — активные сборы</div>
    </header>

    <div class="meta">
      <span>Объектов: {{COUNT}}</span>
      <span>Обновлено: {{UPDATED}}</span>
    </div>

{{CARDS}}

    <footer>
      Estate Invest &copy; 2026
    </footer>
  </div>
</body>
</html>

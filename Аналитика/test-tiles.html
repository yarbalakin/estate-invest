<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Test Cadastral Tiles</title>
<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
<style>html,body,#map{margin:0;padding:0;width:100%;height:100%}</style>
</head>
<body>
<div id="map"></div>
<div id="log" style="position:fixed;bottom:0;left:0;background:rgba(0,0,0,0.8);color:#0f0;padding:10px;font:12px monospace;max-width:100%;max-height:200px;overflow:auto;z-index:9999"></div>
<script>
var PROXY = 'http://5.42.102.36:8080';
var logEl = document.getElementById('log');
function log(msg) {
  console.log(msg);
  logEl.innerHTML += msg + '<br>';
  logEl.scrollTop = logEl.scrollHeight;
}

ymaps.ready(function() {
  log('ymaps ready');
  log('projection: ' + typeof ymaps.projection.wgs84Mercator);
  log('fromGlobalPixels: ' + typeof (ymaps.projection.wgs84Mercator && ymaps.projection.wgs84Mercator.fromGlobalPixels));

  var map = new ymaps.Map('map', {
    center: [58.0, 56.25],  // Пермь
    zoom: 15,
    type: 'yandex#hybrid',
    controls: ['zoomControl']
  });

  // === Способ 1: XYZ bbox (стандартная формула) ===
  function xyzBbox(tx, ty, z) {
    var n = Math.pow(2, z);
    var orig = 20037508.342789244;
    var ts = 2 * orig / n;
    return [-orig + tx*ts, orig - (ty+1)*ts, -orig + (tx+1)*ts, orig - ty*ts];
  }

  // === Способ 2: через ymaps.projection ===
  function ymapsBbox(tx, ty, z) {
    var SIZE = 256;
    var proj = ymaps.projection.wgs84Mercator;
    var p1 = proj.fromGlobalPixels([tx * SIZE, ty * SIZE], z);
    var p2 = proj.fromGlobalPixels([(tx+1) * SIZE, (ty+1) * SIZE], z);
    // p1, p2 — координаты. Определим формат
    log('fromGlobalPixels test: p1=' + JSON.stringify(p1) + ' p2=' + JSON.stringify(p2));
    // Convert to EPSG:3857
    function toM(lon, lat) {
      var x = lon * 20037508.34 / 180;
      var y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180);
      y = y * 20037508.34 / 180;
      return [x, y];
    }
    var m1 = toM(p1[0], p1[1]);
    var m2 = toM(p2[0], p2[1]);
    return [m1[0], m2[1], m2[0], m1[1]];
  }

  // Тест: выведем bbox для центрального тайла обоих способов
  var cx = map.getCenter();
  log('Map center: ' + JSON.stringify(cx));

  // Определяем tile number для центра
  var z = 15;
  var lat = cx[0], lon = cx[1];
  var n = Math.pow(2, z);
  var tx = Math.floor((lon + 180) / 360 * n);
  var ty = Math.floor((1 - Math.log(Math.tan(lat * Math.PI/180) + 1/Math.cos(lat * Math.PI/180)) / Math.PI) / 2 * n);
  log('Standard tile for center: z=' + z + ' x=' + tx + ' y=' + ty);

  var bbox1 = xyzBbox(tx, ty, z);
  log('XYZ bbox: ' + bbox1.map(function(v){return v.toFixed(2)}).join(', '));

  try {
    var bbox2 = ymapsBbox(tx, ty, z);
    log('ymaps bbox: ' + bbox2.map(function(v){return v.toFixed(2)}).join(', '));
    log('DIFF x: ' + (bbox2[0]-bbox1[0]).toFixed(2) + ' y: ' + (bbox2[1]-bbox1[1]).toFixed(2));
  } catch(e) {
    log('ymapsBbox ERROR: ' + e.message);
  }

  // Добавляем слой способом 1 (XYZ)
  var layer1 = new ymaps.Layer(function(tile, zoom) {
    if (zoom < 13) return '';
    var bb = xyzBbox(tile[0], tile[1], zoom);
    return PROXY + '/tiles/wms/36048?bbox=' + bb.join(',');
  }, { tileTransparent: true });
  layer1.getZoomRange = function() { return ymaps.vow.resolve([13, 19]); };

  var tileCount = 0;
  var origGetTileUrl1 = layer1.getTileUrl;

  // Добавляем и логируем первый запрос
  map.layers.add(layer1);
  log('Layer added (XYZ method)');

  // Через 3 секунды пробуем способ 2
  setTimeout(function() {
    log('--- Testing ymaps method ---');
    try {
      var layer2 = new ymaps.Layer(function(tile, zoom) {
        if (zoom < 13) return '';
        var SIZE = 256;
        var proj = ymaps.projection.wgs84Mercator;
        var p1 = proj.fromGlobalPixels([tile[0] * SIZE, tile[1] * SIZE], zoom);
        var p2 = proj.fromGlobalPixels([(tile[0]+1) * SIZE, (tile[1]+1) * SIZE], zoom);
        function toM(lo, la) {
          var x = lo * 20037508.34 / 180;
          var y = Math.log(Math.tan((90 + la) * Math.PI / 360)) / (Math.PI / 180);
          y = y * 20037508.34 / 180;
          return [x, y];
        }
        var m1 = toM(p1[0], p1[1]);
        var m2 = toM(p2[0], p2[1]);
        return PROXY + '/tiles/wms/36049?bbox=' + m1[0]+','+m2[1]+','+m2[0]+','+m1[1];
      }, { tileTransparent: true });
      layer2.getZoomRange = function() { return ymaps.vow.resolve([13, 19]); };
      map.layers.add(layer2);
      log('Layer2 added (ymaps method) — buildings in blue');
    } catch(e) {
      log('Layer2 ERROR: ' + e.message);
    }
  }, 3000);
});
</script>
</body>
</html>

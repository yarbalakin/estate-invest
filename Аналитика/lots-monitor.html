        <img src="${lot.photos[0]}" style="max-width:100%;max-height:280px;object-fit:contain" id="${pid}-main" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'">
        ${lot.photos.length > 1 ? `
          <button onclick="galNav('${pid}',-1)" style="position:absolute;left:4px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px">&lt;</button>
          <button onclick="galNav('${pid}',1)" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px">&gt;</button>
          <div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.6);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px" id="${pid}-counter">1 / ${lot.photos.length}</div>
        ` : ''}
      </div>
      ${lot.photos.length > 1 ? `
        <div style="display:flex;gap:4px;margin-top:6px;overflow-x:auto;padding-bottom:4px">
          ${lot.photos.map((u,i) => `<img src="${u}" data-idx="${i}" onclick="galSet('${pid}',${i})" style="height:48px;width:48px;border-radius:4px;object-fit:cover;cursor:pointer;opacity:${i===0?1:.5};flex-shrink:0" onerror="this.style.display='none'">`).join('')}
        </div>
      ` : ''}
    </div>`;
  }

  // Документы (из глубокого анализа)
  if (lot.documents?.length) {
    const docs = Array.isArray(lot.documents[0]) ? lot.documents : lot.documents.map(d => typeof d === 'string' ? {name:d} : d);
    html += `<div class="modal-section"><div class="section-title">Документы (${docs.length})</div>
      <ul style="margin:0;padding-left:18px;font-size:12px">
        ${docs.map(d => `<li>${escHtml(typeof d === 'string' ? d : d.name||d)}</li>`).join('')}
      </ul></div>`;
  }

  // Должник (из глубокого анализа) — скрыто в agent mode
  if (lot.debtor_info && !_isAgentMode) {
    const di = lot.debtor_info;
    html += `<div class="modal-section"><div class="section-title">Должник</div><div class="detail-grid">
      ${di.inn ? detailRow('ИНН', escHtml(di.inn)) : ''}
      ${di.case ? detailRow('Дело', `<a href="${di.case_url||'#'}" target="_blank" style="color:var(--primary)">${escHtml(di.case)}</a>`, true) : ''}
    </div></div>`;
  }

  // Рыночная оценка — скрыто в agent mode
  if ((lot.market_price||lot.analogs_count) && !_isAgentMode) {
    const analogsList = Array.isArray(lot.analogs_list) ? lot.analogs_list : [];
    const aUnit = lot.area_unit === 'sotka' ? '₽/сот' : '₽/м²';

    html += `<div class="modal-section"><div class="section-title">Рыночная оценка</div><div class="detail-grid">
      ${lot.market_price          ? detailRow('Рыночная цена', formatPrice(lot.market_price)):''}
      ${lot.market_price_per_unit ? detailRow('Рынок за ед.', escHtml(String(lot.market_price_per_unit))):''}
      ${lot.analogs_count         ? detailRow('Аналогов', lot.analogs_count+' объектов'):''}
      ${lot.analogs_median_price  ? detailRow('Медиана', formatPrice(lot.analogs_median_price)+' '+aUnit):''}
      ${lot.analogs_min_price && lot.analogs_max_price ? detailRow('Разброс', formatPrice(lot.analogs_min_price)+' — '+formatPrice(lot.analogs_max_price)+' '+aUnit):''}
      ${lot.analogs_radius_m      ? detailRow('Радиус поиска', (lot.analogs_radius_m>=1000?(lot.analogs_radius_m/1000).toFixed(1)+' км':lot.analogs_radius_m+' м')):''}
      ${lot.confidence ? detailRow('Точность', `<span style="color:${lot.confidence==='высокая'?'var(--green)':lot.confidence==='средняя'?'#f59e0b':'#ef4444'};font-weight:600">${escHtml(lot.confidence)}</span>`, true) : ''}
    </div>`;

    // Список аналогов
    if (analogsList.length > 0) {
      html += `<div class="analogs-header">
        <span class="analogs-subtitle">Объекты из выборки</span>
        <span class="analogs-count-badge">${analogsList.length}</span>
      </div>`;
      html += analogsList.map((a, i) => {
        const dist = a.distance_m != null
          ? (a.distance_m >= 1000 ? (a.distance_m/1000).toFixed(1)+' км' : a.distance_m+' м')
          : null;
        const isActual = a.is_actual === true || a.is_actual === 11 || a.is_actual === '11';
        const badgeClass = isActual ? 'actual' : 'archive';
        const badgeText = isActual ? 'актуально' : 'архив';
        const dateStr = a.date ? a.date.slice(5).replace('-', '.') : '';
        const showLink = isActual && a.url;
        return `<div class="analog-row" onclick="${showLink ? `window.open('${escHtml(a.url)}','_blank')` : ''}" style="${!isActual?'opacity:0.65':''}">
          <span class="analog-num-dot">${i+1}</span>
          <span class="analog-row-price">${formatPrice(a.price)}</span>
          <span class="analog-row-pu">${a.pricePerUnit ? a.pricePerUnit.toLocaleString('ru-RU')+' '+aUnit : '—'}</span>
          <span class="analog-row-area">${a.area ? a.area+' '+(lot.area_unit==='sotka'?'сот':'м²') : '—'}</span>
          ${dist ? `<span class="analog-row-dist">${dist}</span>` : ''}
          ${dateStr ? `<span class="analog-row-date">${dateStr}</span>` : ''}
          <span class="analog-row-badge ${badgeClass}">${badgeText}</span>
          ${showLink ? `<a class="analog-row-link" href="${escHtml(a.url)}" target="_blank" onclick="event.stopPropagation()">↗</a>` : ''}
        </div>`;
      }).join('');
    }

    html += `</div>`; // close modal-section
  }

  // Скоринг — скрыто в agent mode
  if ((lot.invest_score||lot.risk_score||lot.liquidity_score||lot.lookalike_score) && !_isAgentMode) {
    const sb = lot.scoring_breakdown || {};
    const hasBreakdown = sb.invest || sb.risk || sb.liquidity;
    html += `<div class="modal-section"><div class="section-title">Скоринг${hasBreakdown ? ' <span style="font-size:10px;color:var(--text3);font-weight:400">(клик = детали)</span>' : ''}</div>
      <div class="score-grid">
        ${scoreBlock('Invest', lot.invest_score, false, sb.invest ? 'invest' : null)}
        ${scoreBlock('Риск', lot.risk_score, true, sb.risk ? 'risk' : null)}
        ${scoreBlock('Ликвидность', lot.liquidity_score, false, sb.liquidity ? 'liquidity' : null)}
        ${lot.lookalike_score != null ? scoreBlock('Lookalike', lot.lookalike_score) : ''}
      </div>
      ${hasBreakdown ? renderBreakdown('invest', 'Invest — из чего складывается', sb.invest) : ''}
      ${hasBreakdown ? renderBreakdown('risk', 'Риск — факторы', sb.risk) : ''}
      ${hasBreakdown ? renderBreakdown('liquidity', 'Ликвидность — факторы', sb.liquidity) : ''}
      ${lot.estimated_profit||lot.estimated_roi?`<div class="detail-grid" style="margin-top:12px">
        ${lot.estimated_profit    ? detailRow('Ожид. прибыль', formatPrice(lot.estimated_profit),false,'good'):''}
        ${lot.estimated_roi       ? detailRow('Ожид. ROI', lot.estimated_roi.toFixed(1)+'%',false,'good'):''}
        ${lot.estimated_sell_time ? detailRow('Срок продажи', lot.estimated_sell_time+' мес.'):''}
      </div>`:''}
      ${lot.lookalike_match_reason ? `<div class="detail-grid" style="margin-top:8px">${detailRow('Lookalike: почему', escHtml(lot.lookalike_match_reason))}</div>` : ''}
    </div>`;
  }

  if ((lot.ai_recommendation || lot.recommendation) && !_isAgentMode) {
    const recText = lot.ai_recommendation || lot.recommendation;
    const isAi = !!lot.ai_recommendation;
    const rendered = isAi ? simpleMd(recText) : escHtml(recText);
    html += `<div class="modal-section"><div class="section-title"${isAi?' style="color:#7c3aed"':''}>Рекомендация${isAi?' AI':''}</div><div class="recommendation" style="white-space:pre-wrap;line-height:1.6;font-size:12.5px">${rendered}</div></div>`;
  }

  // Должник — скрыто в agent mode
  if ((lot.debtor_name||lot.fssp_count) && !_isAgentMode) {
    html += `<div class="modal-section"><div class="section-title">Должник</div><div class="detail-grid">
      ${lot.debtor_name     ? detailRow('Должник', escHtml(lot.debtor_name)):''}
      ${lot.debtor_inn      ? detailRow('ИНН', escHtml(lot.debtor_inn)):''}
      ${lot.debtor_type     ? detailRow('Тип', escHtml(lot.debtor_type)):''}
      ${lot.bankruptcy_case ? detailRow('Дело о банкротстве', escHtml(lot.bankruptcy_case)):''}
      ${lot.fssp_debts      ? detailRow('Долги ФССП', formatPrice(lot.fssp_debts)):''}
      ${lot.fssp_count!=null&&lot.fssp_count!==undefined ? detailRow('Производств ФССП', lot.fssp_count):''}
      ${lot.court_cases!=null&&lot.court_cases!==undefined ? detailRow('Суд. дел', lot.court_cases):''}
    </div></div>`;
  }

  // Спец блоки
  const specDefs = [
    { key:'apartment', title:'Квартира', labels:{ rooms:'Комнат', floor:'Этаж', floors_total:'Этажей в доме', condition:'Состояние', balcony:'Балкон' }},
    { key:'land', title:'Земельный участок', labels:{ land_category:'Категория', permitted_use:'ВРИ', land_shape:'Форма', has_electricity:'Электричество', has_gas:'Газ', has_water:'Водопровод', has_sewage:'Канализация', communications_note:'Примечание' }},
    { key:'house', title:'Дом', labels:{ rooms:'Комнат', floors_total:'Этажей', wall_material:'Материал стен', build_year:'Год постройки', condition:'Состояние', house_area:'Площадь дома м²', land_area:'Площадь участка сот.', garage_on_site:'Гараж', bathhouse:'Баня' }},
    { key:'building', title:'Здание', labels:{ year:'Год', material:'Материал', floors:'Этажей', wear:'Износ %', building_type:'Тип здания', is_emergency:'Аварийное', heating_type:'Отопление' }},
    { key:'commercial', title:'Коммерция', labels:{ commercial_type:'Тип', floor:'Этаж', ceiling_height:'Высота потолков м', entrance:'Вход', parking:'Парковок' }},
    { key:'rental', title:'Аренда', labels:{ rent_price_month:'Аренда/мес', annual_yield:'Доходность год %', payback_years:'Окупаемость лет', cap_rate:'Cap Rate' }},
    { key:'infra', title:'Инфраструктура', labels:{ metro_distance:'До метро км', schools_nearby:'Школ рядом', shops_nearby:'Магазинов', transport_score:'Транспорт', infra_score:'Инфра' }},
  ];

  const specParts = specDefs.filter(b => lot[b.key] && typeof lot[b.key]==='object').map(b => {
    const fields = Object.entries(lot[b.key]).filter(([k,v])=>v!=null&&v!=='').map(([k,v])=>{
      const val = typeof v==='boolean'?(v?'Да':'Нет'):v;
      return detailRow(b.labels[k]||k, val);
    }).join('');
    return fields ? `<div class="spec-block"><div class="spec-block-title">${b.title}</div><div class="detail-grid">${fields}</div></div>` : '';
  }).join('');

  if (specParts) html += `<div class="modal-section"><div class="section-title">Характеристики</div>${specParts}</div>`;

  // Ссылки + кнопка обогащения
  const links = [];
  if (lot.url)     links.push({ href:lot.url, label:'Открыть на torgi.gov.ru', primary:true });
  if (lot.etp_url) links.push({ href:lot.etp_url, label:'Страница ЭТП' });
  const hasMissing = !lot.area || !lot.address || !lot.cadastral_number;
  html += `<div class="modal-links">`;
  html += links.map(l=>`<a href="${escHtml(l.href)}" target="_blank" class="link-btn ${l.primary?'primary':''}">${escHtml(l.label)}</a>`).join('');
  if (hasMissing) {
    html += `<button onclick="enrichDetail('${escHtml(lot.lot_id)}','${escHtml(lot.source||'')}')" class="link-btn" style="cursor:pointer;background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4);color:#60a5fa">Подтянуть данные</button>`;
  }
  html += `</div>`;

  html += `</div>`; // modal-body
  return html;
}

// ============================================================
// Modal map — Яндекс Карты 2.1
// ============================================================
async function initModalMap(lot) {
  const statusEl = document.getElementById('modal-map-status');
  const mapEl = document.getElementById('modal-map');
  if (!mapEl) return;

  let lat = lot.lat, lon = lot.lon;

  if (!lat || !lon) {
    if (statusEl) { statusEl.style.display='flex'; statusEl.innerHTML=`<span style="font-size:12px">Координаты недоступны. <a href="https://pkk.rosreestr.ru" target="_blank" style="color:var(--accent3)">Открыть ПКК →</a></span>`; }
    return;
  }

  if (statusEl) statusEl.style.display = 'none';

  // === Создаём карту ===
  const ymap = new ymaps.Map('modal-map', {
    center: [lat, lon],
    zoom: 17,
    type: 'yandex#hybrid',
    controls: ['typeSelector', 'zoomControl'],  // встроенный Схема/Спутник/Гибрид
  }, { suppressMapOpenBlock: true });

  window._yandexMapInstance = ymap;

  // PKK tile слои убраны — pkk.rosreestr.ru мёртв
  window._ymapLayers = {};

  // === Маркер объекта ===
  const presetMap = { apartment:'islands#violetDotIcon', land:'islands#greenDotIcon', house:'islands#yellowDotIcon', commercial:'islands#redDotIcon' };
  const lotMark = new ymaps.Placemark([lat, lon], {
    balloonContentHeader: escHtml(displayName(lot)),
    balloonContentBody: `<b style="color:#6366f1">${formatPrice(lot.price)}</b>`,
  }, {
    preset: presetMap[lot.property_type] || 'islands#violetDotIcon',
  });
  ymap.geoObjects.add(lotMark);

  // === Маркеры аналогов ===
  const analogsList = Array.isArray(lot.analogs_list) ? lot.analogs_list : [];
  const analogPoints = [];

  function shortPrice(p) {
    if (p >= 1000000) return (p/1000000).toFixed(1) + 'М';
    if (p >= 1000) return Math.round(p/1000) + 'К';
    return String(p);
  }

  if (analogsList.length > 0) {
    // Пунктирная окружность радиуса поиска
    if (lot.analogs_radius_m) {
      ymap.geoObjects.add(new ymaps.Circle([[lat, lon], lot.analogs_radius_m], {}, {
        fillColor: '#6366f110', strokeColor: '#6366f166', strokeWidth: 2, strokeStyle: 'dash',
      }));
    }

    const aUnit = lot.area_unit === 'sotka' ? '₽/сот' : '₽/м²';
    const medianPU = lot.analogs_median_price || 0;
    analogsList.forEach((a, i) => {
      if (!a.lat || !a.lon) return;
      analogPoints.push([a.lat, a.lon]);
      const dist = a.distance_m != null ? (a.distance_m >= 1000 ? (a.distance_m/1000).toFixed(1)+' км' : a.distance_m+' м') : '';
      // Цветовая шкала по цене/м² относительно медианы
      const apu = a.pricePerUnit || 0;
      let analogPreset;
      if (medianPU && apu) {
        if (apu < medianPU * 0.9) analogPreset = 'islands#greenStretchyIcon';
        else if (apu > medianPU * 1.1) analogPreset = 'islands#redStretchyIcon';
        else analogPreset = 'islands#yellowStretchyIcon';
      } else {
        analogPreset = 'islands#blueStretchyIcon';
      }
      ymap.geoObjects.add(new ymaps.Placemark([a.lat, a.lon], {
        iconContent: a.price ? shortPrice(a.price) : String(i + 1),
        balloonContentHeader: `Аналог ${i+1}`,
        balloonContentBody: `Цена: <b>${formatPrice(a.price)}</b><br>${aUnit}: <b>${a.pricePerUnit ? a.pricePerUnit.toLocaleString('ru-RU') : '—'}</b>${dist ? `<br>Расстояние: <b>${dist}</b>` : ''}${a.url ? `<br><a href="${escHtml(a.url)}" target="_blank" style="display:inline-block;margin-top:4px;padding:4px 10px;background:#6366f1;color:#fff;border-radius:5px;text-decoration:none;font-size:12px">Открыть ↗</a>` : ''}`,
      }, { preset: analogPreset }));
    });
  }

  // === Медианный бейдж ===
  if (lot.analogs_median_price && lot.analogs_count) {
    const aUnit = lot.area_unit === 'sotka' ? '₽/сот' : '₽/м²';
    const radius = lot.analogs_radius_m ? (lot.analogs_radius_m >= 1000 ? (lot.analogs_radius_m/1000).toFixed(1)+' км' : lot.analogs_radius_m+' м') : '';
    const badge = document.createElement('div');
    badge.className = 'map-median-badge';
    badge.innerHTML = `<div style="font-weight:600">Медиана: ${lot.analogs_median_price.toLocaleString('ru-RU')} ${aUnit}</div><div style="font-size:11px;opacity:0.7">${lot.analogs_count} аналогов${radius ? ' \u2022 ' + radius : ''}</div>`;
    document.getElementById('modal-map').appendChild(badge);
  }

  // === Автомасштаб и граница участка ===
  if (analogPoints.length > 0) {
    try {
      const allPts = [[lat, lon], ...analogPoints];
      ymap.setBounds(ymaps.util.bounds.fromPoints(allPts), { checkZoomRange: true, margin: 40 });
    } catch(e) {}
  } else if (lot.cadastral_number) {
    loadCadastralGeometryYmaps(lot, ymap);
  }
}

// Рисуем полигон границ участка на модальной карте.
// Сначала пробуем boundary_geojson из БД, иначе запрашиваем PKK.
async function loadCadastralGeometryYmaps(lot, ymap) {
  const style = { fillColor: '#e879f928', strokeColor: '#c026d3', strokeWidth: 3 };
  const convertRing = ring => ring.map(([lo, la]) => [la, lo]);

  function drawGeom(geom) {
    let firstPoly = null;
    if (geom.type === 'Polygon') {
      firstPoly = new ymaps.Polygon(geom.coordinates.map(convertRing), {}, style);
      ymap.geoObjects.add(firstPoly);
    } else if (geom.type === 'MultiPolygon') {
      geom.coordinates.forEach((poly, i) => {
        const p = new ymaps.Polygon(poly.map(convertRing), {}, style);
        ymap.geoObjects.add(p);
        if (i === 0) firstPoly = p;
      });
    }
    if (firstPoly) {
      const bounds = firstPoly.geometry.getBounds();
      if (bounds) ymap.setBounds(bounds, { checkZoomRange: true, margin: 40 });
    }
  }

  // Берём полигон из кэша/Supabase
  const boundary = lot.boundary_geojson || await fetchBoundary(lot.lot_id);
  if (boundary) {
    drawGeom(boundary);
    return;
  }

  // Нет полигона в БД — ничего не рисуем (pkk.rosreestr.ru мёртв)
}

function lutStyle(lut) {

    'ИЖС':                   'background:rgba(16,185,129,0.22);color:#34d399',
    'ЛПХ':                   'background:rgba(16,185,129,0.12);color:#6ee7b7',

  };
  return map[lut] || 'background:rgba(100,116,139,0.18);color:#94a3b8';
}

function displayName(lot) {
  const type = lot.property_type || '';
  const area = lot.area;
  const unit = lot.area_unit === 'sotka' ? 'сот' : lot.area_unit === 'ha' ? 'га' : 'м²';

  // Тип
  let label = '';
  if (type === 'apartment') {
    // Попробуем извлечь кол-во комнат из названия
    const rm = (lot.name||'').match(/(\d)\s*[-–]?\s*комн/i) || (lot.name||'').match(/(\d)\s*к[.,\s]/i);
    label = rm ? `Квартира ${rm[1]}к` : 'Квартира';
  } else if (type === 'land') {
    label = 'Участок';
  } else if (type === 'house') {
    label = 'Дом';
  } else if (type === 'commercial') {
    // Попробуем уточнить подтип
    const n = (lot.name||'').toLowerCase();
    if (n.includes('офис')) label = 'Офис';
    else if (n.includes('склад')) label = 'Склад';
    else if (n.includes('магазин') || n.includes('торгов')) label = 'Торговое';
    else if (n.includes('гараж') || n.includes('бокс')) label = 'Гараж';
    else if (n.includes('здани')) label = 'Здание';
    else label = 'Нежилое';
  } else if (type === 'garage') {
    label = 'Гараж';
  } else {
    label = lot.category || 'Объект';
  }

  // Площадь
  let areaStr = '';
  if (area) {
    if (type === 'land' && unit === 'м²' && area >= 100) {
      areaStr = (area / 100).toFixed(1).replace(/\.0$/, '') + ' сот';
    } else {
      areaStr = area + ' ' + unit;
    }
  }

  // Адрес — короткий (город + улица)
  let addr = '';
  const raw = lot.address_std || lot.address || '';
  if (raw) {
    // Убираем "Пермский край," "Калининградская обл.," и т.п.
    let clean = raw.replace(/^(Пермский край|Калининградская обл\.?|Брянская обл\.?|Россия|Российская Федерация)[,\s]*/i, '');
    clean = clean.replace(/^м\.о\.\s*\S+[,\s]*/i, '');
    clean = clean.replace(/^г\.о\.\s*\S+[,\s]*/i, '');
    // Берём первые 2 значимых части
    const parts = clean.split(',').map(s => s.trim()).filter(s => s.length > 2);
    addr = parts.slice(0, 2).join(', ');
    if (addr.length > 50) addr = addr.substring(0, 47) + '...';
  }

  // Собираем
  const chunks = [label, areaStr, addr].filter(Boolean);
  return chunks.join(' · ') || lot.name || 'Без названия';
}

function formatPrice(v) {
  if (!v && v!==0) return '—';
  v = parseFloat(v);
  if (v>=1e6)  return (v/1e6).toFixed(2).replace(/\.?0+$/,'') + ' млн ₽';
  if (v>=1000) return Math.round(v/1000) + ' тыс ₽';
  return v.toFixed(0) + ' ₽';
}

function actualPrice(lot) {
  if (lot.trade_type !== 'public_offer' || !lot.price_schedule || !lot.price_schedule.length) return lot.price;
  const today = new Date().toISOString().slice(0,10);
  for (let i = lot.price_schedule.length - 1; i >= 0; i--) {
    if (lot.price_schedule[i].date_start <= today) return lot.price_schedule[i].price;
  }
  return lot.price;
}

function tradeBadgeHtml(lot) {
  if (!lot.trade_type) return ''; // неизвестный тип — не показываем
  if (lot.trade_type === 'public_offer') {
    return `<span class="trade-badge trade-public">Публичка ↓</span>`;
  }
  return `<span class="trade-badge trade-auction">Аукцион ↑</span>`;
}

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch{ return d; }
}

function simpleMd(s) {
  if (s==null) return '';
  s = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');           // **жирный**
  s = s.replace(/##\s+(.+)/g, '<b style="font-size:13px">$1</b>'); // ## заголовок
  s = s.replace(/\*(.+?)\*/g, '<i>$1</i>');                 // *курсив*
  s = s.replace(/^- (.+)/gm, '• $1');                       // - список → •
  return s;
}
function escHtml(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Photo gallery state
const _galState = {};
function galSet(pid, idx) {
  const lot = window._currentModalLot;
  if (!lot?.photos?.length) return;
  idx = Math.max(0, Math.min(idx, lot.photos.length - 1));
  _galState[pid] = idx;
  const main = document.getElementById(pid + '-main');
  if (main) main.src = lot.photos[idx];
  const counter = document.getElementById(pid + '-counter');
  if (counter) counter.textContent = `${idx + 1} / ${lot.photos.length}`;
  // Update thumbnail opacity
  const thumbs = document.querySelectorAll(`#${pid} + div img[data-idx]`);
  thumbs.forEach(t => t.style.opacity = parseInt(t.dataset.idx) === idx ? 1 : 0.5);
}
function galNav(pid, dir) {
  const lot = window._currentModalLot;
  if (!lot?.photos?.length) return;
  const cur = _galState[pid] || 0;
  galSet(pid, cur + dir);
}

async function deepAnalysis(lotId) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Загрузка...';
  btn.style.background = '#6366f1';
  try {
    const tbId = lotId.replace('TB-', '');
    const isLocal = location.protocol === 'file:';
    const base = isLocal ? 'http://5.42.102.36:8080' : '';
    const url = `${base}/api/deep-analysis?lot_id=${encodeURIComponent(lotId)}&tb_id=${tbId}`;
    console.log('Deep analysis URL:', url);
    const resp = await fetch(url, {
      headers: {'X-API-Key': 'ei-torgi-2026-mvp'}
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const data = await resp.json();
    console.log('Deep analysis result:', data);
    if (data.error) throw new Error(data.error);
    // Обновляем лот в кэше
    delete FULL_LOT_CACHE[lotId];
    const lot = allLots.find(l => l.lot_id === lotId);
    if (lot) {
      if (data.encumbrances) lot.encumbrances = data.encumbrances;
      if (data.photos?.length) lot.photos = data.photos;
      if (data.documents?.length) lot.documents = data.documents;
      if (data.card) lot.tbankrot_card = data.card;
      if (data.debtor) lot.debtor_info = data.debtor;
      if (data.links) lot._deep_links = data.links;
      FULL_LOT_CACHE[lotId] = lot; // сохраняем обновлённый кэш
      btn.textContent = `Готово! (${data.photos_count||0} фото)`;
      btn.style.background = '#22c55e';
      showModal(lot);
    } else {
      btn.textContent = 'Лот не найден';
      btn.style.background = '#ef4444';
    }
  } catch(e) {
    console.error('Deep analysis error:', e);
    btn.textContent = 'Ошибка';
    btn.style.background = '#ef4444';
    btn.title = e.message;
    // Показываем ошибку пользователю
    alert('Ошибка глубокого анализа: ' + e.message);
  }
}

function renderEncumbrances(lot) {
  const enc = lot.encumbrances;

  const items = [

  html += '<div style="font-weight:600;font-size:11px;color:var(--text2);margin-bottom:4px">Обременения (TBankrot)</div>';
  for (const [label, val] of items) {
    const yes = val === true;

function scoreBlock(label, val, inverted=false, breakdownKey=null) {
  const s = val ? Math.round(val) : null;
  const pct = s||0;
  const eff = inverted ? 100-pct : pct;
  const color = eff>=70?'#34d399':eff>=40?'#fbbf24':'#f87171';
  const deg = Math.round(pct*3.6);
  const clickAttr = breakdownKey ? `class="score-block clickable" onclick="toggleBreakdown('${breakdownKey}')"` : `class="score-block"`;
  return `<div ${clickAttr}>
    <div class="score-circle" style="background:conic-gradient(${color} ${deg}deg,rgba(255,255,255,0.06) ${deg}deg)">
      <div class="score-inner" style="color:${color}">${s||'—'}</div>
    </div>
    <div class="score-block-label">${label}${breakdownKey ? ' ▾' : ''}</div>
  </div>`;
}

function toggleBreakdown(key) {
  const el = document.getElementById('sb-'+key);
  if (el) el.classList.toggle('open');
}

function renderBreakdown(key, label, reasons) {
  if (!reasons || !reasons.length) return '';
  const rows = reasons.map(r => {
    const ptsClass = r.pts > 0 ? 'positive' : r.pts < 0 ? 'negative' : 'zero';
    const ptsSign = r.pts > 0 ? '+' : '';
    const barPct = r.max ? Math.min(100, Math.round(Math.abs(r.pts) / r.max * 100)) : 0;
    const barColor = r.pts > 0 ? '#34d399' : r.pts < 0 ? '#f87171' : '#64748b';
    return `<div class="sb-row">
      <div class="sb-factor">${r.factor}<div class="sb-note">${r.note||''}</div></div>
      ${r.max ? `<div class="sb-bar"><div class="sb-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>` : ''}
      <div class="sb-pts ${ptsClass}">${ptsSign}${r.pts}</div>
    </div>`;
  }).join('');
  return `<div class="score-breakdown" id="sb-${key}">
    <div class="score-breakdown-title">${label}</div>${rows}</div>`;
}

// ============================================================
// Cadastral tile layers (via VPS proxy -> mapbaza.ru -> NSPD)
// ============================================================
const TILE_PROXY = 'http://5.42.102.36:8080';
const _cadastralLayers = {};

const CADASTRAL_LAYER_DEFS = [
  { id: 36048, name: 'Земельные участки ЕГРН' },
  { id: 36049, name: 'Здания' },
  { id: 36328, name: 'Сооружения' },
  { id: 36071, name: 'Кадастровые кварталы' },
];

function createCadastralTileLayer(layerId) {
  // Yandex Maps uses ellipsoidal Mercator (EPSG:3395) for tile grid,
  // but WMS expects EPSG:3857 (spherical). Use fromGlobalPixels to bridge.
  const R = 20037508.342789244;
  function toEPSG3857(lat, lon) {
    var x = lon * R / 180;
    var latRad = lat * Math.PI / 180;
    var y = Math.log(Math.tan(Math.PI / 4 + latRad / 2)) * R / Math.PI;
    return [x, y];
  }
  const tileLayer = new ymaps.Layer(function(tileNumber, tileZoom) {
    if (tileZoom < 13) return '';
    var proj = ymaps.projection.wgs84Mercator;
    // fromGlobalPixels returns [lat, lon] in Yandex format
    var tl = proj.fromGlobalPixels([tileNumber[0] * 256, tileNumber[1] * 256], tileZoom);
    var br = proj.fromGlobalPixels([(tileNumber[0] + 1) * 256, (tileNumber[1] + 1) * 256], tileZoom);
    var m1 = toEPSG3857(tl[0], tl[1]); // top-left  [x, y_top]
    var m2 = toEPSG3857(br[0], br[1]); // bot-right [x, y_bot]
    var bbox = m1[0] + ',' + m2[1] + ',' + m2[0] + ',' + m1[1];
    return TILE_PROXY + '/tiles/wms/' + layerId + '?bbox=' + bbox;
  }, { tileTransparent: true, opacity: 0.3 });

  tileLayer.getZoomRange = function() {
    return ymaps.vow.resolve([13, 19]);
  };
  return tileLayer;
}

function toggleCadastralLayer(layerId, enabled) {
  if (enabled) {
    if (!_cadastralLayers[layerId]) {
      _cadastralLayers[layerId] = createCadastralTileLayer(layerId);
    }
    mainMap.layers.add(_cadastralLayers[layerId]);
  } else {
    if (_cadastralLayers[layerId]) {
      mainMap.layers.remove(_cadastralLayers[layerId]);
    }
  }
}

function addLayersControl(map) {
  const layerIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.8"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>';

  const basemapTabs = `<div class="layers-basemap-tabs">
    <button class="layers-basemap-tab" onclick="setBasemap('map',this)">Схема</button>
    <button class="layers-basemap-tab" onclick="setBasemap('satellite',this)">Спутник</button>
    <button class="layers-basemap-tab active" onclick="setBasemap('hybrid',this)">Гибрид</button>
  </div>`;

  const checkboxes = CADASTRAL_LAYER_DEFS.map(l =>
    `<label><input type="checkbox" onchange="toggleCadastralLayer(${l.id}, this.checked)">${l.name}</label>`
  ).join('');

  const Layout = ymaps.templateLayoutFactory.createClass(
    `<div class="layers-control">
      <button class="layers-control-btn" onclick="this.nextElementSibling.classList.toggle('open')">
        ${layerIcon} Слои <span class="arrow">&#9662;</span>
      </button>
      <div class="layers-dropdown">${basemapTabs}${checkboxes}</div>
    </div>`
  );

  const ctrl = new ymaps.control.Button({ options: {
    layout: Layout,
    float: 'right',
    floatIndex: 300,
    selectOnClick: false,
    maxWidth: 320,
  }});
  map.controls.add(ctrl);

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.layers-control')) {
      document.querySelectorAll('.layers-dropdown.open').forEach(d => d.classList.remove('open'));
    }
  });
}

function setBasemap(type, btn) {
  if (!mainMap) return;
  mainMap.setType('yandex#' + type);
  const tabs = btn.parentElement.querySelectorAll('.layers-basemap-tab');
  tabs.forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Монитор лотов — Estate Invest</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Yandex Maps API -->
<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
<style>
:root {
  --bg: #0a0b14; --bg2: #0f1120; --bg3: #161829;
  --card: rgba(22,24,41,0.85); --card-hover: rgba(30,33,58,0.95);
  --border: rgba(99,102,241,0.18); --border2: rgba(99,102,241,0.35);
  --accent: #6366f1; --accent2: #818cf8; --accent3: #a5b4fc;
  --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --radius: 14px; --radius2: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse 80% 50% at 10% 0%, rgba(99,102,241,0.12) 0%, transparent 60%),
              radial-gradient(ellipse 60% 40% at 90% 100%, rgba(129,140,248,0.08) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

/* === HEADER === */
header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,11,20,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px; height:64px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:12px; font-size:17px; font-weight:600; letter-spacing:-.3px; }
.logo-dot {
  width:32px; height:32px; border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;
}
.header-stats { display:flex; gap:24px; align-items:center; }
.hstat { text-align:right; }
.hstat-val { font-size:15px; font-weight:600; color:var(--accent3); }
.hstat-label { font-size:11px; color:var(--text3); }

/* === MAIN === */
main { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:24px 32px; }

/* === VIEW TABS === */
.view-tabs {
  display:flex; gap:4px; margin-bottom:20px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; padding:4px; width:fit-content;
}
.view-tab {
  padding:7px 18px; border-radius:7px; border:none;
  font-size:13px; font-weight:500; font-family:'Inter',sans-serif;
  cursor:pointer; transition:all .2s; color:var(--text3); background:transparent;
  display:flex; align-items:center; gap:7px;
}
.view-tab.active { background:var(--accent); color:#fff; }
.view-tab:not(.active):hover { color:var(--text2); background:rgba(255,255,255,0.06); }

/* === FILTERS === */
.filters { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
.filter-group { display:flex; align-items:center; gap:7px; }
.filter-label { font-size:12px; color:var(--text3); white-space:nowrap; }
select, input[type="text"] {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:7px 12px; font-size:13px; font-family:'Inter',sans-serif;
  outline:none; cursor:pointer; transition:border-color .2s;
}
select:hover, select:focus, input[type="text"]:hover, input[type="text"]:focus { border-color:var(--accent); }
.search-wrap { position:relative; flex:1; max-width:300px; }
.search-wrap input { width:100%; padding-left:34px; cursor:text; }
.search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
.btn { padding:7px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; border:none; font-family:'Inter',sans-serif; }
.btn-ghost { background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--accent); color:var(--text); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-small { padding:5px 12px; font-size:12px; }

/* === RESULTS BAR === */
.results-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; font-size:13px; color:var(--text3); }
.results-count { font-weight:500; color:var(--text2); }
.active-filters { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.filter-tag {
  display:flex; align-items:center; gap:5px; padding:3px 10px;
  border-radius:20px; background:rgba(99,102,241,0.15); color:var(--accent3);
  font-size:11px; font-weight:500; border:1px solid rgba(99,102,241,0.25);
}
.filter-tag button { background:none; border:none; color:var(--accent3); cursor:pointer; padding:0; font-size:14px; line-height:1; }

/* === CARD GRID === */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
.lot-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; cursor:pointer; transition:all .25s; position:relative; overflow:hidden;
  backdrop-filter:blur(12px);
}
.lot-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(99,102,241,0.06) 0%,transparent 60%);
  opacity:0; transition:opacity .25s;
}
.lot-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:0 8px 32px rgba(99,102,241,0.15); background:var(--card-hover); }
.lot-card:hover::before { opacity:1; }
.card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:8px; }
.type-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:500; letter-spacing:.3px; white-space:nowrap; }
.type-apartment { background:rgba(99,102,241,0.2); color:var(--accent3); }
.type-land      { background:rgba(16,185,129,0.18); color:#6ee7b7; }
.type-house     { background:rgba(245,158,11,0.18); color:#fcd34d; }
.type-commercial{ background:rgba(239,68,68,0.18); color:#fca5a5; }
.type-unknown   { background:rgba(100,116,139,0.2); color:var(--text2); }
.discount-badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.discount-high { background:rgba(16,185,129,0.2); color:#34d399; }
.discount-mid  { background:rgba(245,158,11,0.2); color:#fbbf24; }
.discount-low  { background:rgba(100,116,139,0.18); color:var(--text2); }
.card-title { font-size:13px; font-weight:500; color:var(--text); line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-address { font-size:12px; color:var(--text3); margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.card-metrics { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.metric { background:rgba(255,255,255,0.04); border-radius:8px; padding:10px 12px; }
.metric-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.metric-val { font-size:14px; font-weight:600; color:var(--text); }
.metric-val.accent { color:var(--accent3); }
.metric-val.green  { color:var(--green); }
.card-score { display:flex; gap:6px; align-items:center; padding-top:12px; border-top:1px solid var(--border); }
.score-item { flex:1; text-align:center; }
.score-val { font-size:16px; font-weight:700; display:block; margin-bottom:2px; }
.score-label { font-size:10px; color:var(--text3); }
.score-divider { width:1px; height:32px; background:var(--border); }
.score-track { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,0.08); overflow:hidden; }
.score-fill { height:4px; border-radius:2px; transition:width .4s; }

/* === TABLE VIEW === */
#view-table { overflow-x:auto; }
.lot-table { width:100%; border-collapse:collapse; }
.lot-table thead th {
  padding:11px 14px; text-align:left; font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:.6px; color:var(--text3);
  background:var(--bg3); border-bottom:1px solid var(--border);
  white-space:nowrap; position:sticky; top:0; z-index:1;
}
.lot-table thead th.sortable { cursor:pointer; user-select:none; }
.lot-table thead th.sortable:hover { color:var(--accent3); }
.lot-table thead th .sort-icon { margin-left:4px; opacity:.5; }
.lot-table thead th.sort-asc .sort-icon::after  { content:'↑'; opacity:1; color:var(--accent3); }
.lot-table thead th.sort-desc .sort-icon::after { content:'↓'; opacity:1; color:var(--accent3); }
.lot-table thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content:'↕'; }
.lot-table tbody tr { cursor:pointer; transition:background .15s; border-bottom:1px solid rgba(255,255,255,0.04); }
.lot-table tbody tr:hover { background:rgba(99,102,241,0.08); }
.lot-table tbody td { padding:11px 14px; font-size:13px; color:var(--text2); vertical-align:middle; }
.lot-table tbody td:first-child { color:var(--text); }
.tbl-discount-high { color:#34d399; font-weight:600; }
.tbl-discount-mid  { color:#fbbf24; font-weight:600; }
.tbl-discount-low  { color:var(--text3); }
.tbl-score { display:inline-flex; align-items:center; gap:6px; }
.tbl-score-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.lot-table .td-name { max-width:240px; }
.lot-table .td-name span { display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; color:var(--text); }
.lot-table .td-addr span { display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; max-width:200px; }

/* === MAP VIEW === */
#view-map { position:relative; }
.map-wrap {
  border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; position:relative;
}
#main-map { height:620px; background:var(--bg2); }
.map-controls {
  position:absolute; top:12px; left:12px; z-index:1000;
  display:flex; flex-direction:column; gap:6px;
}
.map-control-btn {
  background:rgba(15,17,32,0.9); backdrop-filter:blur(10px);
  border:1px solid var(--border); color:var(--text2); border-radius:8px;
  padding:7px 12px; font-size:12px; font-weight:500; cursor:pointer;
  font-family:'Inter',sans-serif; transition:all .2s; white-space:nowrap;
}
.map-control-btn:hover { border-color:var(--accent); color:var(--text); }
.map-control-btn.active { background:rgba(99,102,241,0.3); border-color:var(--accent); color:var(--accent3); }
.map-base-btn {
  background:transparent; border:none; color:var(--text3); border-radius:6px;
  padding:5px 10px; font-size:11px; font-weight:500; cursor:pointer;
  font-family:'Inter',sans-serif; transition:all .2s;
}
.map-base-btn:hover { color:var(--text); }
.map-base-btn.active { background:var(--accent); color:#fff; }
.cadastral-polygon { cursor:pointer; }
.map-geocode-progress {
  position:absolute; bottom:12px; left:12px; z-index:1000;
  background:rgba(15,17,32,0.9); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:8px;
  padding:7px 14px; font-size:12px; color:var(--text3);
  display:none;
}
.map-legend {
  position:absolute; bottom:12px; right:12px; z-index:1000;
  background:rgba(15,17,32,0.9); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; font-size:11px;
}
.legend-item { display:flex; align-items:center; gap:7px; margin-bottom:5px; color:var(--text2); }
.legend-item:last-child { margin-bottom:0; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* === STATES === */
.loading { display:flex; align-items:center; justify-content:center; min-height:300px; flex-direction:column; gap:16px; color:var(--text3); }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:80px 20px; color:var(--text3); }
.empty-icon { font-size:48px; margin-bottom:16px; opacity:.4; }
.empty-title { font-size:18px; font-weight:500; color:var(--text2); margin-bottom:8px; }
.empty-sub { font-size:13px; }

/* === MODAL === */
.modal-overlay { position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:none; align-items:flex-start; justify-content:center; padding:32px 16px; overflow-y:auto; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px; width:100%; max-width:860px; box-shadow:0 24px 80px rgba(0,0,0,0.6); animation:slideUp .25s ease; flex-shrink:0; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.modal-header { padding:24px 28px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
.modal-title-group { flex:1; }
.modal-badges { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.modal-title { font-size:18px; font-weight:600; line-height:1.35; margin-bottom:6px; }
.modal-subtitle { font-size:13px; color:var(--text3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.modal-close { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text2); border-radius:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; font-size:18px; }
.modal-close:hover { background:rgba(255,255,255,0.1); color:var(--text); }
.modal-body { padding:24px 28px; }
.modal-section { margin-bottom:24px; }
.section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--accent); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.modal-kpi { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.kpi-card { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:14px 16px; text-align:center; }
.kpi-val { font-size:22px; font-weight:700; margin-bottom:4px; display:block; }
.kpi-label { font-size:11px; color:var(--text3); }
.kpi-val.accent { color:var(--accent3); }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.detail-row { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-radius:8px; background:rgba(255,255,255,0.03); gap:8px; }
.detail-key { font-size:12px; color:var(--text3); white-space:nowrap; }
.detail-val { font-size:12px; font-weight:500; color:var(--text); text-align:right; word-break:break-word; }
.detail-val.good { color:var(--green); }
.detail-val.warn { color:var(--yellow); }
.detail-val.bad  { color:var(--red); }
.score-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.score-block { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
.score-circle { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 10px; position:relative; }
.score-inner { width:52px; height:52px; border-radius:50%; background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
.score-block-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.recommendation { padding:14px 18px; border-radius:12px; border-left:3px solid var(--accent); background:rgba(99,102,241,0.08); font-size:13px; line-height:1.6; color:var(--text2); }
.spec-block { background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.15); border-radius:12px; padding:16px; margin-bottom:12px; }
.spec-block-title { font-size:12px; font-weight:600; color:var(--accent3); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
.modal-links { display:flex; gap:10px; flex-wrap:wrap; padding-top:16px; border-top:1px solid var(--border); }
.link-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:12px; font-weight:500; text-decoration:none; transition:all .2s; border:1px solid var(--border); color:var(--text2); background:var(--bg3); }
.link-btn:hover { border-color:var(--accent); color:var(--accent3); }
.link-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.link-btn.primary:hover { background:var(--accent2); }

/* === MODAL MAP === */
.modal-map-container { position:relative; border-radius:12px; overflow:hidden; border:1px solid var(--border); margin-bottom:14px; }
#modal-map { height:340px; background:var(--bg3); }

/* Переключатель схема/спутник/гибрид */
.map-basemap-ctrl {
  position:absolute; top:10px; left:10px; z-index:500;
  display:flex; gap:3px;
  background:rgba(15,17,32,0.88); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:3px;
}
.map-bm-btn {
  padding:5px 11px; border-radius:6px; border:none;
  font-size:11px; font-weight:500; font-family:'Inter',sans-serif;
  cursor:pointer; color:rgba(255,255,255,0.6); background:transparent; transition:all .15s;
}
.map-bm-btn.active { background:rgba(99,102,241,0.8); color:#fff; }
.map-bm-btn:not(.active):hover { color:#fff; background:rgba(255,255,255,0.1); }


/* === АНАЛОГИ === */
.analogs-header {
  display:flex; align-items:center; justify-content:space-between;
  margin:14px 0 10px;
}
.analogs-subtitle { font-size:11px; color:var(--text3); }
.analogs-count-badge {
  background:rgba(99,102,241,0.15); color:var(--accent2);
  border:1px solid rgba(99,102,241,0.25);
  border-radius:12px; padding:2px 9px; font-size:11px; font-weight:600;
}
.analog-row {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:9px;
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  margin-bottom:6px; cursor:pointer; transition:border-color .15s;
}
.analog-row:hover { border-color:var(--accent); }
.analog-num-dot {
  width:20px; height:20px; border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#fff; flex-shrink:0;
}
.analog-row-price { font-size:13px; font-weight:600; color:var(--text); min-width:90px; }
.analog-row-pu { font-size:11px; color:var(--accent3); min-width:95px; }
.analog-row-area { font-size:11px; color:var(--text3); min-width:70px; }
.analog-row-dist {
  font-size:10px; background:rgba(99,102,241,0.1); color:var(--accent2);
  border-radius:8px; padding:2px 7px; white-space:nowrap;
}
.analog-row-link {
  margin-left:auto; font-size:10px; color:var(--accent2); text-decoration:none; flex-shrink:0;
}
.analog-row-link:hover { text-decoration:underline; }
.modal-map-status { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--bg3); z-index:10; font-size:13px; color:var(--text3); flex-direction:column; gap:10px; }
.modal-map-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Yandex Maps overrides */
.lot-popup { min-width:200px; font-family:'Inter',sans-serif; }
.lot-popup-title { font-weight:600; font-size:13px; margin-bottom:6px; color:#1e293b; }
.lot-popup-price { color:#6366f1; font-weight:700; font-size:14px; margin-bottom:4px; }
.lot-popup-sub { font-size:11px; color:#64748b; }
.lot-popup-btn { margin-top:8px;width:100%;padding:6px 12px;border-radius:6px;background:#6366f1;color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:Inter,sans-serif; }
.lot-popup-btn:hover { background:#818cf8; }
.lot-popup-btns { display:flex;gap:6px;margin-top:8px; }
.lot-popup-btn-outline { flex:1;padding:6px 10px;border-radius:6px;background:rgba(99,102,241,0.1);color:#6366f1;border:1px solid rgba(99,102,241,0.3);cursor:pointer;font-size:11px;font-weight:500;font-family:Inter,sans-serif; }
.lot-popup-btn-outline:hover { background:rgba(99,102,241,0.2); }
[class*="ymaps-2"][class*="balloon__content"] { padding:0 !important; }

@media (max-width:768px) {
  main { padding:16px; } header { padding:0 16px; }
  .header-stats { display:none; }
  .modal-kpi { grid-template-columns:repeat(2,1fr); }
  .detail-grid { grid-template-columns:1fr; }
  .modal { border-radius:16px; }
  #main-map { height:450px; }
}
</style>
</head>
<body>

<header>

  </div>

<main>

    </button>
    <button class="view-tab" id="tab-table" onclick="setView('table')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M21 3h-4M9 21H5a2 2 0 0 1-2-2v-4"/><path d="M21 21h-4M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      Таблица
    </button>
    <button class="view-tab" id="tab-map" onclick="setView('map')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>

    </button>
  </div>

  <!-- Фильтры -->
  <div class="filters">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Поиск по адресу, названию..." oninput="applyFilters()">

        <option value="date_desc">Новые</option>

  <div class="results-bar">

        <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>Квартира</div>
        <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Земля</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Дом</div>

</main>

<!-- Модал -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ============================================================
// Config & Init
// ============================================================
const SUPABASE_URL = 'https://eeahxalvnvbroswzyfjx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JO8ZrGiCpncWrffYQO9LoQ_OOAwQj2V';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// State
let allLots = [], filteredLots = [];
let currentView = 'grid';
let tableSortCol = 'date_added', tableSortDir = 'desc';

// Map state
let mainMap = null, mainClusterer = null, pkkLayer = null, pkkEnabled = true;
const _loadedCadastralIds = new Set();

// ============================================================
// Data loading
// ============================================================
async function loadData() {
  showLoading();
  try {
    const { data, error } = await db.from('properties').select('*').order('date_added', { ascending: false }).limit(500);
    if (error) throw error;
    allLots = data || [];
    updateHeaderStats();
    populateDistrictFilter();
    applyFilters();
  } catch(err) {
    showError(err.message);
  }
}

function showLoading() {
  document.getElementById('grid').innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><span>Загрузка...</span></div>`;
}
function showError(msg) {
  document.getElementById('grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><div class="empty-title">Ошибка загрузки</div><div class="empty-sub">${escHtml(msg)}</div></div>`;
  document.getElementById('results-count').textContent = 'Ошибка';
}

// ============================================================
// View switching
// ============================================================
function setView(v) {
  currentView = v;
  ['grid','table','map'].forEach(id => {
    document.getElementById('view-' + id).style.display = id === v ? '' : 'none';
    document.getElementById('tab-' + id).classList.toggle('active', id === v);
  });
  if (v === 'map') {
    initMainMap();
    updateMapMarkers();
  } else if (v === 'table') {
    renderTable();
  }
}

// ============================================================
// Filters & sorting
// ============================================================
function applyFilters() {
  const search   = document.getElementById('search-input').value.toLowerCase();
  const type     = document.getElementById('filter-type').value;
  const discount = parseFloat(document.getElementById('filter-discount').value) || 0;
  const district = document.getElementById('filter-district').value;
  const sort     = document.getElementById('sort-by').value;

  filteredLots = allLots.filter(lot => {
    if (type && lot.property_type !== type) return false;
    if (discount && (lot.discount || 0) < discount) return false;
    if (district && lot.district !== district) return false;
    if (search) {
      const hay = [lot.name, lot.address, lot.address_std, lot.lot_id].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  filteredLots.sort((a, b) => {
    switch(sort) {
      case 'discount_desc': return (b.discount||0)-(a.discount||0);
      case 'price_asc':     return (a.price||0)-(b.price||0);
      case 'price_desc':    return (b.price||0)-(a.price||0);
      case 'score_desc':    return (b.invest_score||0)-(a.invest_score||0);
      default: return new Date(b.date_added||0)-new Date(a.date_added||0);
    }
  });

  document.getElementById('results-count').textContent = `${filteredLots.length} из ${allLots.length} лотов`;
  renderResultsTags(search, type, discount, district);

  if (currentView === 'grid') renderGrid();
  else if (currentView === 'table') renderTable();
  else if (currentView === 'map') updateMapMarkers();
}

function populateDistrictFilter() {
  const districts = [...new Set(allLots.map(l => l.district).filter(Boolean))].sort();
  const sel = document.getElementById('filter-district');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Все районы</option>';
  districts.forEach(d => sel.innerHTML += `<option value="${d}"${d===cur?' selected':''}>${d}</option>`);
}

function renderResultsTags(search, type, discount, district) {
  const tags = [];
  if (type)     tags.push({ label: typeLabel(type), clear: () => { document.getElementById('filter-type').value=''; applyFilters(); }});
  if (discount) tags.push({ label: `дисконт ${discount}%+`, clear: () => { document.getElementById('filter-discount').value=''; applyFilters(); }});
  if (district) tags.push({ label: district, clear: () => { document.getElementById('filter-district').value=''; applyFilters(); }});
  if (search)   tags.push({ label: `"${search}"`, clear: () => { document.getElementById('search-input').value=''; applyFilters(); }});
  window._tagClears = tags.map(t => t.clear);
  document.getElementById('active-filters').innerHTML = tags.map((t,i) =>
    `<span class="filter-tag">${escHtml(t.label)}<button onclick="window._tagClears[${i}]()">×</button></span>`).join('');
}

// ============================================================
// Grid rendering
// ============================================================
function renderGrid() {
  const grid = document.getElementById('grid');
  if (!filteredLots.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-title">Лоты не найдены</div><div class="empty-sub">Измените фильтры</div></div>`;
    return;
  }
  grid.innerHTML = filteredLots.map(lot => {
    const discount = lot.discount ? Math.round(lot.discount) : null;
    const dCls = discount>=30?'discount-high':discount>=15?'discount-mid':'discount-low';
    const score = lot.invest_score ? Math.round(lot.invest_score) : null;
    const sColor = scoreColor(score);
    return `
    <div class="lot-card" onclick="openModal('${escHtml(lot.lot_id)}')">
      <div class="card-head">
        <span class="type-badge type-${lot.property_type||'unknown'}">${typeLabel(lot.property_type)}</span>
        ${discount ? `<span class="discount-badge ${dCls}">−${discount}%</span>` : ''}
      </div>
      <div class="card-title">${escHtml(lot.name||lot.category||'Без названия')}</div>
      <div class="card-address">📍 ${escHtml(lot.address_std||lot.address||'Адрес не указан')}</div>
      <div class="card-metrics">
        <div class="metric"><div class="metric-label">Цена торгов</div><div class="metric-val accent">${formatPrice(lot.price)}</div></div>
        <div class="metric"><div class="metric-label">Рыночная</div><div class="metric-val ${lot.market_price?'green':''}">${lot.market_price?formatPrice(lot.market_price):'—'}</div></div>
        <div class="metric"><div class="metric-label">Площадь</div><div class="metric-val">${lot.area?(lot.area+' '+areaUnit(lot.area_unit)):'—'}</div></div>
        <div class="metric"><div class="metric-label">Аукцион</div><div class="metric-val">${lot.auction_date?formatDate(lot.auction_date):'—'}</div></div>
      </div>
      <div class="card-score">
        ${score ? `
          <div class="score-item"><span class="score-val" style="color:${sColor}">${score}</span><span class="score-label">скоринг</span></div>
          <div class="score-divider"></div>
          <div style="flex:2;display:flex;align-items:center;gap:6px">
            <div class="score-track"><div class="score-fill" style="width:${score}%;background:${sColor}"></div></div>
            <span style="font-size:10px;color:var(--text3)">${score>=70?'Высокий':score>=40?'Средний':'Низкий'}</span>
          </div>` : `<span style="font-size:11px;color:var(--text3)">Скоринг не рассчитан</span>`}
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// Table rendering
// ============================================================
const TABLE_COLS = [
  { key:'property_type', label:'Тип',     sortable:true,  w:'100px' },
  { key:'name',          label:'Название',sortable:true,  w:'240px' },
  { key:'address',       label:'Адрес',   sortable:false, w:'200px' },
  { key:'area',          label:'Площадь', sortable:true,  w:'90px'  },
  { key:'price',         label:'Цена',    sortable:true,  w:'110px' },
  { key:'market_price',  label:'Рыночная',sortable:true,  w:'110px' },
  { key:'discount',      label:'Дисконт', sortable:true,  w:'90px'  },
  { key:'auction_date',  label:'Торги',   sortable:true,  w:'100px' },
  { key:'invest_score',  label:'Скоринг', sortable:true,  w:'90px'  },
];

function renderTable() {
  if (!filteredLots.length) {
    document.getElementById('table-container').innerHTML =
      `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Лоты не найдены</div></div>`;
    return;
  }

  // Sort for table
  const sorted = [...filteredLots].sort((a,b) => {
    let va = a[tableSortCol], vb = b[tableSortCol];
    if (va === null || va === undefined) va = tableSortDir==='asc' ? Infinity : -Infinity;
    if (vb === null || vb === undefined) vb = tableSortDir==='asc' ? Infinity : -Infinity;
    if (typeof va === 'string') return tableSortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return tableSortDir==='asc' ? va-vb : vb-va;
  });

  const headers = TABLE_COLS.map(c => {
    const sortCls = c.sortable ? `sortable ${c.key===tableSortCol ? 'sort-'+tableSortDir : ''}` : '';
    const onclick = c.sortable ? `onclick="sortTable('${c.key}')"` : '';
    return `<th class="${sortCls}" style="width:${c.w}" ${onclick}>${c.label}<span class="sort-icon"></span></th>`;
  }).join('');

  const rows = sorted.map(lot => {
    const discount = lot.discount ? Math.round(lot.discount) : null;
    const dCls = discount>=30?'tbl-discount-high':discount>=15?'tbl-discount-mid':'tbl-discount-low';
    const score = lot.invest_score ? Math.round(lot.invest_score) : null;
    const sColor = scoreColor(score);
    return `
    <tr onclick="openModal('${escHtml(lot.lot_id)}')">
      <td><span class="type-badge type-${lot.property_type||'unknown'}">${typeLabel(lot.property_type)}</span></td>
      <td class="td-name"><span title="${escHtml(lot.name||'')}"> ${escHtml(lot.name||lot.category||'—')}</span></td>
      <td class="td-addr"><span title="${escHtml(lot.address_std||lot.address||'')}"> ${escHtml(lot.address_std||lot.address||'—')}</span></td>
      <td>${lot.area ? lot.area+' '+areaUnit(lot.area_unit) : '—'}</td>
      <td style="color:var(--accent3);font-weight:500">${formatPrice(lot.price)}</td>
      <td style="color:var(--green)">${lot.market_price ? formatPrice(lot.market_price) : '—'}</td>
      <td class="${dCls}">${discount ? '−'+discount+'%' : '—'}</td>
      <td>${lot.auction_date ? formatDate(lot.auction_date) : '—'}</td>
      <td>${score ? `<span class="tbl-score"><span class="tbl-score-dot" style="background:${sColor}"></span>${score}</span>` : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-container').innerHTML = `
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)">
      <table class="lot-table">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function sortTable(col) {
  if (tableSortCol === col) tableSortDir = tableSortDir==='asc' ? 'desc' : 'asc';
  else { tableSortCol = col; tableSortDir = 'desc'; }
  renderTable();
}

// ============================================================
// Main map
// ============================================================
const TYPE_COLORS = { apartment:'#6366f1', land:'#10b981', house:'#f59e0b', commercial:'#ef4444' };

function initMainMap() {
  if (mainMap) return;

  ymaps.ready(() => {
    mainMap = new ymaps.Map('main-map', {
      center: [58.0, 56.2],
      zoom: 8,
      type: 'yandex#hybrid',
      controls: ['typeSelector', 'zoomControl', 'rulerControl'],
    }, { suppressMapOpenBlock: true });

    // PKK кадастровый слой
    pkkLayer = new ymaps.Layer(
      'https://pkk.rosreestr.ru/arcgis/rest/services/PKK6/Cadastre/MapServer/tile/%z/%y/%x',
      { tileTransparent: true, opacity: 0.7 }
    );
    if (pkkEnabled) mainMap.layers.add(pkkLayer);

    // Кластеризатор
    mainClusterer = new ymaps.Clusterer({
      preset: 'islands#invertedVioletClusterIcons',
      clusterDisableClickZoom: false,
      clusterOpenBalloonOnClick: false,
      groupByCoordinates: false,
    });
    mainMap.geoObjects.add(mainClusterer);

    // При зуме >= 15 загружаем контуры
    mainMap.events.add('boundschange', () => {
      if (mainMap.getZoom() >= 15) loadVisibleCadastralPolygons();
    });

    // Обновляем маркеры
    updateMapMarkers();
  });
}

function updateMapMarkers() {
  if (!mainMap || !mainClusterer) return;
  mainClusterer.removeAll();

  const presetMap = {
    apartment: 'islands#violetDotIcon',
    land:      'islands#greenDotIcon',
    house:     'islands#yellowDotIcon',
    commercial:'islands#redDotIcon',
  };

  const placemarks = [];

  filteredLots.forEach(lot => {
    const lat = lot.lat, lon = lot.lon;
    if (!lat || !lon) return;

    const discount = lot.discount ? Math.round(lot.discount) : null;
    const score = lot.invest_score ? Math.round(lot.invest_score) : null;

    const bodyParts = [
      `<div class="lot-popup">`,
      `<div class="lot-popup-price">${formatPrice(lot.price)}${discount ? ' · −'+discount+'%' : ''}</div>`,
      `<div class="lot-popup-sub">${escHtml(lot.address_std||lot.address||'').substring(0,80)}</div>`,
      lot.cadastral_number ? `<div class="lot-popup-sub" style="opacity:.7;margin-top:2px">${escHtml(lot.cadastral_number)}</div>` : '',
      score ? `<div class="lot-popup-sub" style="margin-top:4px">Скоринг: ${score}</div>` : '',
      `<div class="lot-popup-btns">`,
      `<button class="lot-popup-btn" style="flex:1" onclick="window.openModal('${escHtml(lot.lot_id)}')">Карточка</button>`,
      lot.cadastral_number ? `<button class="lot-popup-btn-outline" onclick="window.zoomToLotCadastre('${escHtml(lot.lot_id)}')">Контур</button>` : '',
      `</div></div>`,
    ];

    const pm = new ymaps.Placemark([lat, lon], {
      balloonContentHeader: escHtml(lot.name||lot.category||'Объект').substring(0,60),
      balloonContentBody: bodyParts.join(''),
      hintContent: `${formatPrice(lot.price)}${discount ? ' (−'+discount+'%)' : ''}`,
    }, {
      preset: presetMap[lot.property_type] || 'islands#violetDotIcon',
    });

    placemarks.push(pm);
  });

  mainClusterer.add(placemarks);
  document.getElementById('geocode-progress').style.display = 'none';
}

function fitMapToMarkers() {
  if (!mainMap || !mainClusterer) return;
  const bounds = mainClusterer.getBounds();
  if (bounds) mainMap.setBounds(bounds, { checkZoomRange: true, margin: 40 });
}

function togglePkkLayer() {
  if (!mainMap) return;
  pkkEnabled = !pkkEnabled;
  if (pkkEnabled) mainMap.layers.add(pkkLayer);
  else mainMap.layers.remove(pkkLayer);
  document.getElementById('btn-pkk-layer').classList.toggle('active', pkkEnabled);
}

// Загрузка контуров видимых лотов
function loadVisibleCadastralPolygons() {
  if (!mainMap) return;
  const bounds = mainMap.getBounds();
  filteredLots.forEach(lot => {
    if (!lot.cadastral_number || _loadedCadastralIds.has(lot.cadastral_number)) return;
    if (!lot.lat || !lot.lon) return;
    if (!bounds.contains([lot.lat, lot.lon])) return;
    _loadedCadastralIds.add(lot.cadastral_number);
    loadCadastralPolygonYmapsMain(lot);
  });
}

// Загрузка контура из PKK и отрисовка на основной карте
async function loadCadastralPolygonYmapsMain(lot) {
  const cn = lot.cadastral_number;
  const colorMap = { apartment:'#6366f1', land:'#10b981', house:'#f59e0b', commercial:'#ef4444' };
  const color = colorMap[lot.property_type] || '#6366f1';

  for (const ft of [1, 5]) {
    try {
      const r = await fetch(`https://pkk.rosreestr.ru/api/features/${ft}/${encodeURIComponent(cn)}`);
      if (!r.ok) continue;
      const data = await r.json();
      const geom = data?.feature?.geometry;
      if (!geom) continue;

      const convertRing = ring => ring.map(([lo, la]) => [la, lo]);
      const style = { fillColor: color + '28', strokeColor: color, strokeWidth: 3 };

      if (geom.type === 'Polygon') {
        const poly = new ymaps.Polygon(geom.coordinates.map(convertRing), {
          balloonContentHeader: escHtml(lot.name||lot.category||'').substring(0,60),
          balloonContentBody: `<div class="lot-popup"><div class="lot-popup-price">${formatPrice(lot.price)}</div><div class="lot-popup-sub">${escHtml(cn)}</div><button class="lot-popup-btn" onclick="window.openModal('${escHtml(lot.lot_id)}')">Открыть карточку</button></div>`,
        }, style);
        mainMap.geoObjects.add(poly);
      } else if (geom.type === 'MultiPolygon') {
        geom.coordinates.forEach(polyCoords => {
          const poly = new ymaps.Polygon(polyCoords.map(convertRing), {}, style);
          mainMap.geoObjects.add(poly);
        });
      }
      return;
    } catch(e) {}
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ============================================================
// Modal
// ============================================================
function openModal(lotId) {
  const lot = allLots.find(l => l.lot_id === lotId);
  if (!lot) return;
  destroyModalMap();
  document.getElementById('modal-content').innerHTML = renderModalContent(lot);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Инициализируем карту в модале асинхронно
  requestAnimationFrame(() => initModalMap(lot));
}

function closeModal(e) {
  if (e === true || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    destroyModalMap();
  }
}

function destroyModalMap() {
  if (window._yandexMapInstance) {
    try { window._yandexMapInstance.destroy(); } catch(e) {}
    window._yandexMapInstance = null;
    window._ymapLayers = null;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(true); });

async function initModalMap(lot) {
  const statusEl = document.getElementById('modal-map-status');
  const mapEl = document.getElementById('modal-map');
  if (!mapEl) return;

  let lat = lot.lat, lon = lot.lon;

  if (!lat || !lon) {
    if (statusEl) { statusEl.style.display='flex'; statusEl.innerHTML=`<span style="font-size:12px">Координаты недоступны. <a href="https://pkk.rosreestr.ru" target="_blank" style="color:var(--accent3)">Открыть ПКК →</a></span>`; }
    return;
  }

  if (statusEl) statusEl.style.display = 'none';

  // === Создаём карту ===
  const ymap = new ymaps.Map('modal-map', {
    center: [lat, lon],
    zoom: 17,
    type: 'yandex#satellite',         // спутник по умолчанию как в bankrot.ru
    controls: ['typeSelector', 'zoomControl'],  // встроенный Схема/Спутник/Гибрид
  }, { suppressMapOpenBlock: true });

  window._yandexMapInstance = ymap;

  // === PKK/ЕГРН слои Росреестра ===
  // URL формат для Яндекс Maps 2.1: %z/%y/%x
  window._ymapLayers = {
    cadastre:  new ymaps.Layer('https://pkk.rosreestr.ru/arcgis/rest/services/PKK6/Cadastre/MapServer/tile/%z/%y/%x',          { tileTransparent: true, opacity: 0.7 }),
    buildings: new ymaps.Layer('https://pkk.rosreestr.ru/arcgis/rest/services/PKK6/CadastreSelected/MapServer/tile/%z/%y/%x',  { tileTransparent: true, opacity: 0.7 }),
    zones:     new ymaps.Layer('https://pkk.rosreestr.ru/arcgis/rest/services/PKK6/ZONES/MapServer/tile/%z/%y/%x',             { tileTransparent: true, opacity: 0.6 }),
    quart:     new ymaps.Layer('https://pkk.rosreestr.ru/arcgis/rest/services/PKK6/KQ/MapServer/tile/%z/%y/%x',                { tileTransparent: true, opacity: 0.5 }),
  };
  ymap.layers.add(window._ymapLayers.cadastre); // включён по умолчанию

  // === Маркер объекта ===
  const presetMap = { apartment:'islands#violetDotIcon', land:'islands#greenDotIcon', house:'islands#yellowDotIcon', commercial:'islands#redDotIcon' };
  const lotMark = new ymaps.Placemark([lat, lon], {
    balloonContentHeader: escHtml(lot.name || lot.category || 'Объект'),
    balloonContentBody: `<b style="color:#6366f1">${formatPrice(lot.price)}</b>`,
  }, {
    preset: presetMap[lot.property_type] || 'islands#violetDotIcon',
  });
  ymap.geoObjects.add(lotMark);

  // === Маркеры аналогов ===
  const analogsList = Array.isArray(lot.analogs_list) ? lot.analogs_list : [];
  const analogPoints = [];

  if (analogsList.length > 0) {
    // Пунктирная окружность радиуса поиска
    if (lot.analogs_radius_m) {
      ymap.geoObjects.add(new ymaps.Circle([[lat, lon], lot.analogs_radius_m], {}, {
        fillColor: '#6366f110', strokeColor: '#6366f166', strokeWidth: 2, strokeStyle: 'dash',
      }));
    }

    const aUnit = lot.area_unit === 'sotka' ? '₽/сот' : '₽/м²';
    analogsList.forEach((a, i) => {
      if (!a.lat || !a.lon) return;
      analogPoints.push([a.lat, a.lon]);
      const dist = a.distance_m != null ? (a.distance_m >= 1000 ? (a.distance_m/1000).toFixed(1)+' км' : a.distance_m+' м') : '';
      ymap.geoObjects.add(new ymaps.Placemark([a.lat, a.lon], {
        iconContent: String(i + 1),
        balloonContentHeader: `Аналог ${i+1}`,
        balloonContentBody: `Цена: <b>${formatPrice(a.price)}</b><br>${aUnit}: <b>${a.pricePerUnit ? a.pricePerUnit.toLocaleString('ru-RU') : '—'}</b>${dist ? `<br>Расстояние: <b>${dist}</b>` : ''}${a.url ? `<br><a href="${escHtml(a.url)}" target="_blank">Открыть ↗</a>` : ''}`,
      }, { preset: 'islands#blueStretchyIcon' }));
    });
  }

  // === Автомасштаб и граница участка ===
  if (analogPoints.length > 0) {
    try {
      const allPts = [[lat, lon], ...analogPoints];
      ymap.setBounds(ymaps.util.bounds.fromPoints(allPts), { checkZoomRange: true, margin: 40 });
    } catch(e) {}
  } else if (lot.cadastral_number) {
    loadCadastralGeometryYmaps(lot.cadastral_number, ymap);
  }
}

// Загружаем геометрию участка из ПКК API и рисуем полигон
async function loadCadastralGeometryYmaps(cadastralNumber, ymap) {
  for (const t of [1, 5]) { // 1=участки, 5=ОКС
    try {
      const r = await fetch(`https://pkk.rosreestr.ru/api/features/${t}/${encodeURIComponent(cadastralNumber)}`);
      if (!r.ok) continue;
      const data = await r.json();
      const geom = data?.feature?.geometry;
      if (!geom) continue;

      // GeoJSON [lon, lat] → Яндекс [lat, lon]
      const convertRing = ring => ring.map(([lo, la]) => [la, lo]);
      let coords;
      if (geom.type === 'Polygon') {
        coords = geom.coordinates.map(convertRing);
      } else if (geom.type === 'MultiPolygon') {
        // Рисуем все контуры
        geom.coordinates.forEach(poly => {
          ymap.geoObjects.add(new ymaps.Polygon(poly.map(convertRing), {}, {
            fillColor: '#e879f928', strokeColor: '#c026d3', strokeWidth: 3,
          }));
        });
        // Центрируем на первом
        coords = geom.coordinates[0].map(convertRing);
      }

      if (coords) {
        const polygon = new ymaps.Polygon(coords, {}, {
          fillColor: '#e879f928',  // розово-фиолетовый как в bankrot.ru/ПКК
          strokeColor: '#c026d3',
          strokeWidth: 3,
        });
        ymap.geoObjects.add(polygon);
        // Центрируем на участке
        const bounds = polygon.geometry.getBounds();
        if (bounds) ymap.setBounds(bounds, { checkZoomRange: true, margin: 40 });
      }
      return;
    } catch(e) {}
  }
}

// ============================================================
// Helpers
// ============================================================
function typeLabel(t) { return {apartment:'Квартира',land:'Земля',house:'Дом',commercial:'Коммерция'}[t]||'Прочее'; }
function areaUnit(u) { return {m2:'м²',sotka:'сот.',ha:'га'}[u]||'м²'; }
function scoreColor(s) { return s>=70?'#34d399':s>=40?'#fbbf24':s?'#f87171':'#64748b'; }

function formatPrice(v) {
  if (!v && v!==0) return '—';
  v = parseFloat(v);
  if (v>=1e6)  return (v/1e6).toFixed(2).replace(/\.?0+$/,'') + ' млн ₽';
  if (v>=1000) return Math.round(v/1000) + ' тыс ₽';
  return v.toFixed(0) + ' ₽';
}

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch{ return d; }
}

function escHtml(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function detailRow(key, val, raw=false, cls='') {
  return `<div class="detail-row">
    <span class="detail-key">${key}</span>
    ${raw ? val : `<span class="detail-val ${cls}">${escHtml(String(val))}</span>`}
  </div>`;
}

function scoreBlock(label, val, inverted=false) {
  const s = val ? Math.round(val) : null;
  const pct = s||0;
  const eff = inverted ? 100-pct : pct;
  const color = eff>=70?'#34d399':eff>=40?'#fbbf24':'#f87171';
  const deg = Math.round(pct*3.6);
  return `<div class="score-block">
    <div class="score-circle" style="background:conic-gradient(${color} ${deg}deg,rgba(255,255,255,0.06) ${deg}deg)">
      <div class="score-inner" style="color:${color}">${s||'—'}</div>
    </div>
    <div class="score-block-label">${label}</div>
  </div>`;
}

// Управление слоями в модале Яндекс Карт
function switchBasemap(type) {
  if (!window._yandexMapInstance) return;
  const ymap = window._yandexMapInstance;
  if (type === 'schema')  ymap.setType('yandex#map');
  else if (type === 'sat') ymap.setType('yandex#satellite');
  else if (type === 'hybrid') ymap.setType('yandex#hybrid');
}

function toggleMapLayer(layerKey, enabled) {
  if (!window._yandexMapInstance || !window._ymapLayers) return;
  const layer = window._ymapLayers[layerKey];
  if (!layer) return;
  if (enabled) window._yandexMapInstance.layers.add(layer);
  else window._yandexMapInstance.layers.remove(layer);
}

// ============================================================
// Start
// ============================================================
window.openModal = openModal;
window.switchBasemap = switchBasemap;
window.toggleMapLayer = toggleMapLayer;

// Зум к лоту и загрузка контура на основной карте
window.zoomToLotCadastre = function(lotId) {
  const lot = allLots.find(l => l.lot_id === lotId);
  if (!lot || !lot.lat || !lot.lon) return;
  mainMap.balloon.close();
  mainMap.setCenter([lot.lat, lot.lon], 17);
  if (lot.cadastral_number && !_loadedCadastralIds.has(lot.cadastral_number)) {
    _loadedCadastralIds.add(lot.cadastral_number);
    loadCadastralPolygonYmapsMain(lot);
  }
};
loadData();
</script>
